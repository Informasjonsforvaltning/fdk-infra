name: 'Terraform Prod Environment'

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/prod/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/prod/**'

# Use concurrency to prevent parallel runs on the same environment
concurrency:
  group: terraform-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest

    # Security: Use minimal permissions for plan
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    defaults:
      run:
        working-directory: terraform/prod

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
      with:
        workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_PROD }}
        service_account: ${{ secrets.TERRAFORM_PLAN_SA_PROD }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1
      with:
        version: 'latest'

    - name: 'Fetch sensitive variables from Secret Manager'
      id: 'secrets'
      run: |
        echo "Fetching sensitive terraform variables from Secret Manager..."
        # Fetch the actual tfvars content from Secret Manager
        gcloud secrets versions access latest --secret="terraform-prod-sensitive-vars" > terraform.tfvars

        # Verify the file was created (but don't show contents)
        if [ ! -f terraform.tfvars ]; then
          echo "❌ Failed to fetch terraform.tfvars from Secret Manager"
          exit 1
        fi

        echo "✅ Successfully fetched sensitive variables"
        echo "📊 Variables file size: $(wc -l < terraform.tfvars) lines"

    - name: 'Setup Terraform'
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
      with:
        terraform_version: '~1.13.0'

    - name: 'Terraform Init'
      id: init
      run: |
        # Create backend configuration from GitHub secret
        cat > backend.hcl <<EOF
        bucket = "${{ secrets.TERRAFORM_BACKEND_BUCKET_PROD }}"
        EOF

        terraform init -backend-config=backend.hcl
        echo "✅ Terraform initialized successfully with dynamic backend"

    - name: 'Terraform Format Check'
      id: fmt
      run: |
        # Only format check .tf files, exclude any .tfvars files
        terraform fmt -check *.tf
      continue-on-error: true

    - name: 'Terraform Validate'
      id: validate
      run: |
        terraform validate
        echo "✅ Terraform configuration is valid"

    - name: 'Terraform Plan'
      id: plan
      run: |
        # Run terraform plan with sensitive vars
        # -lock=false: the read-only plan SA cannot write the GCS state lock object
        # Redirect stdout to a file (cleaned up later) so nothing is echoed; on failure show only the tail.
        set +e
        terraform plan -var-file="terraform.tfvars" -out=tfplan -no-color -lock=false > plan_output.txt 2>&1
        PLAN_EXIT=$?
        set -e
        if [ "$PLAN_EXIT" -ne 0 ]; then
          echo "❌ Terraform plan failed - showing last 20 lines of output:"
          tail -20 plan_output.txt
          exit "$PLAN_EXIT"
        fi

        # Full plan not echoed to logs (public repo); see PR summary + counts below
        # Count planned changes from machine-readable JSON (robust vs grep)
        terraform show -json tfplan > plan.json
        ADD_COUNT=$(jq '[.resource_changes[] | select(.change.actions == ["create"])] | length' plan.json)
        CHANGE_COUNT=$(jq '[.resource_changes[] | select(.change.actions == ["update"])] | length' plan.json)
        DESTROY_COUNT=$(jq '[.resource_changes[] | select(.change.actions == ["delete"])] | length' plan.json)
        REPLACE_COUNT=$(jq '[.resource_changes[] | select(.change.actions == ["delete","create"] or .change.actions == ["create","delete"])] | length' plan.json)

        echo "plan-add-count=$ADD_COUNT" >> $GITHUB_OUTPUT
        echo "plan-change-count=$CHANGE_COUNT" >> $GITHUB_OUTPUT
        echo "plan-destroy-count=$DESTROY_COUNT" >> $GITHUB_OUTPUT
        echo "plan-replace-count=$REPLACE_COUNT" >> $GITHUB_OUTPUT

        echo "✅ Terraform plan completed - $ADD_COUNT to add, $CHANGE_COUNT to change, $DESTROY_COUNT to destroy, $REPLACE_COUNT to replace"
      continue-on-error: true

    - name: 'Comment PR with Plan Summary'
      if: github.event_name == 'pull_request'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
      with:
        script: |
          const addCount = '${{ steps.plan.outputs.plan-add-count }}';
          const changeCount = '${{ steps.plan.outputs.plan-change-count }}';
          const destroyCount = '${{ steps.plan.outputs.plan-destroy-count }}';
          const replaceCount = '${{ steps.plan.outputs.plan-replace-count }}';

          let planSummary = '';
          if (addCount > 0) planSummary += `**${addCount}** to add, `;
          if (changeCount > 0) planSummary += `**${changeCount}** to change, `;
          if (destroyCount > 0) planSummary += `**${destroyCount}** to destroy, `;
          if (replaceCount > 0) planSummary += `**${replaceCount}** to replace`;

          // Clean up trailing comma
          planSummary = planSummary.replace(/, $/, '');

          if (!planSummary) {
            planSummary = 'No changes detected';
          }

          const output = `
          ## Terraform Prod Environment Status

          #### Terraform Format and Style 🖌 \`${{ steps.fmt.outcome }}\`
          #### Terraform Initialization ⚙️ \`${{ steps.init.outcome }}\`
          #### Terraform Validation 🤖 \`${{ steps.validate.outcome }}\`
          #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

          **Plan Summary:** ${planSummary}

          > 📋 The full plan is not published to the public logs. Review it by running \`terraform plan\` locally against this branch.

          *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Working Directory: \`terraform/prod\`*`;

          // Find existing comment
          const comments = await github.rest.issues.listComments({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
          });

          const botComment = comments.data.find(comment =>
            comment.user.type === 'Bot' && comment.body.includes('Terraform Prod Environment Status')
          );

          if (botComment) {
            // Update existing comment
            await github.rest.issues.updateComment({
              comment_id: botComment.id,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
          } else {
            // Create new comment
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
          }

    - name: 'Cleanup sensitive files'
      if: always()
      run: |
        # Always cleanup sensitive files, even if job fails
        rm -f terraform.tfvars tfplan plan.json plan_output.txt backend.hcl
        echo "🧹 Cleaned up sensitive files"

    - name: 'Job Summary'
      if: always()
      run: |
        echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Format Check**: ${{ steps.fmt.outcome }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Init**: ${{ steps.init.outcome }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Validate**: ${{ steps.validate.outcome }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Plan**: ${{ steps.plan.outcome }}" >> $GITHUB_STEP_SUMMARY

  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Require manual approval via the protected 'production' environment
    # before the WIF token is minted or any apply step runs.
    environment: production

    # Security: Use minimal permissions for apply
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: terraform/prod

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
      with:
        workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_PROD }}
        service_account: ${{ secrets.TERRAFORM_SA_PROD }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1
      with:
        version: 'latest'

    - name: 'Setup Terraform'
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
      with:
        terraform_version: '~1.13.0'

    - name: 'Fetch sensitive variables from Secret Manager'
      run: |
        echo "Fetching sensitive terraform variables from Secret Manager..."
        gcloud secrets versions access latest --secret="terraform-prod-sensitive-vars" > terraform.tfvars

        if [ ! -f terraform.tfvars ]; then
          echo "❌ Failed to fetch terraform.tfvars from Secret Manager"
          exit 1
        fi

        echo "✅ Successfully fetched sensitive variables"

    - name: 'Terraform Init'
      run: |
        cat > backend.hcl <<EOF
        bucket = "${{ secrets.TERRAFORM_BACKEND_BUCKET_PROD }}"
        EOF

        terraform init -backend-config=backend.hcl
        echo "✅ Terraform initialized successfully"

    - name: 'Terraform Apply'
      run: |
        echo "🚀 Applying Terraform changes to prod..."
        # Atomic plan+apply in one operation (no persisted plan; public repo).
        # Redirect stdout to a file so the resource diff is not echoed to the public
        # log; surface only the final summary line (or errors on failure).
        set +e
        terraform apply -var-file="terraform.tfvars" -auto-approve -no-color > apply_output.txt 2>&1
        APPLY_EXIT=$?
        set -e
        if [ "$APPLY_EXIT" -ne 0 ]; then
          echo "❌ Terraform apply failed - showing last 30 lines of output:"
          tail -30 apply_output.txt
          exit "$APPLY_EXIT"
        fi
        # Only the summary line ("Apply complete! Resources: ..."), not the diff
        grep -E "^Apply complete" apply_output.txt || true
        echo "✅ Terraform apply completed successfully"

    - name: 'Cleanup sensitive files'
      if: always()
      run: |
        rm -f terraform.tfvars tfplan plan.json apply_output.txt backend.hcl
        echo "🧹 Cleaned up sensitive files"

    - name: 'Job Summary'
      if: always()
      run: |
        echo "## Terraform Apply Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Apply**: Completed ✅" >> $GITHUB_STEP_SUMMARY